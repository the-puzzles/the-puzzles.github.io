<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Games</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
[v-cloak] { display: none; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117; color: #c9d1d9;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 48px 20px 64px;
}

.lang-toggle { display: flex; gap: 6px; justify-content: center; margin-bottom: 18px; }
.lang-btn {
  padding: 5px 10px; border-radius: 6px; font-size: .75rem; font-weight: 700;
  cursor: pointer; background: #161b22; color: #6e7681; border: 1px solid #30363d;
}
.lang-btn.active { background: #0c2233; color: #58a6ff; border-color: #58a6ff; }

header { text-align: center; margin-bottom: 56px; }
.site-title { font-size: 3rem; font-weight: 900; letter-spacing: .06em; color: #e6edf3; margin-bottom: 10px; }
.site-sub { color: #6e7681; font-size: 1rem; max-width: 420px; margin: 0 auto; line-height: 1.6; }
.how-link {
  display: inline-block; margin-top: 12px; font-size: .82rem; color: #6e7681;
  text-decoration: none; border: 1px solid #30363d; border-radius: 6px; padding: 5px 12px;
  transition: color .15s, border-color .15s;
}
.how-link:hover { color: #c9d1d9; border-color: #6e7681; }

.categories { display: flex; flex-direction: column; gap: 48px; max-width: 860px; width: 100%; }
.category-label {
  font-size: .7rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: #444c56; margin-bottom: 16px;
}
.cards { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; width: 100%; }

/* ── Card ──────────────────────────────────────────────────────────── */
.card {
  background: #161b22; border: 2px solid #30363d; border-radius: 16px;
  padding: 28px 28px 24px; width: 380px; display: flex; flex-direction: column;
  gap: 18px; transition: border-color .2s, transform .2s, box-shadow .2s;
  text-decoration: none; color: inherit;
}
.card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 12px 40px var(--shadow);
}
.card-header { display: flex; align-items: center; gap: 14px; }
.card-icon {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
  background: var(--icon-bg);
}
.card-title {
  font-size: 1.5rem; font-weight: 800; letter-spacing: .06em;
  background: var(--gradient);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* ── Preview ───────────────────────────────────────────────────────── */
.preview {
  border: 2px solid #21262d; border-radius: 10px; overflow: hidden;
  background: #0d1117; display: inline-grid; align-self: center;
}
.preview-cell {
  width: 36px; height: 36px; display: flex; align-items: center;
  justify-content: center; border: 1px solid #21262d; position: relative;
}
.preview-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.3);
}

/* ── Card body ─────────────────────────────────────────────────────── */
.card-tagline { font-size: .88rem; color: #8b949e; line-height: 1.6; }
.card-rules { display: flex; flex-direction: column; gap: 6px; }
.rule { display: flex; align-items: flex-start; gap: 8px; font-size: .82rem; color: #6e7681; line-height: 1.5; }
.rule-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--accent); }

/* ── Play button ───────────────────────────────────────────────────── */
.play-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 20px; border-radius: 10px; font-size: .9rem; font-weight: 700;
  letter-spacing: .04em; border: 1px solid var(--accent); cursor: pointer;
  text-decoration: none; transition: opacity .15s, transform .1s; margin-top: 4px;
  background: var(--btn-bg); color: var(--btn-color);
}
.play-btn:hover { opacity: .88; transform: translateY(-1px); }
.play-btn:active { transform: translateY(0); }
.play-arrow { font-size: 1rem; transition: transform .15s; }
.card:hover .play-arrow { transform: translateX(3px); }

footer { margin-top: 64px; color: #444c56; font-size: .78rem; text-align: center; }

@media (max-width: 480px) {
  .site-title { font-size: 2.2rem; }
  .card { width: 100%; max-width: 400px; padding: 22px 20px 20px; }
  .preview-cell { width: 30px; height: 30px; }
  .preview-dot { width: 11px; height: 11px; }
}
</style>
</head>
<body>
<div id="app" v-cloak>
  <div class="lang-toggle">
    <button class="lang-btn" :class="{active: lang==='en'}" @click="setLang('en')">EN</button>
    <button class="lang-btn" :class="{active: lang==='he'}" @click="setLang('he')">עב</button>
    <button class="lang-btn" :class="{active: lang==='es'}" @click="setLang('es')">ES</button>
  </div>

  <header>
    <div class="site-title">{{ T('siteTitle') }}</div>
    <p class="site-sub">{{ T('siteSub') }}</p>
    <a class="how-link" href="how-to-play.html">{{ T('howToPlay') }} ↗</a>
  </header>

  <div class="categories">
    <div v-for="cat in CATEGORIES" :key="cat.label">
      <div class="category-label">{{ catLabel(cat.label) }}</div>
      <div class="cards">
        <a
          v-for="g in cat.games"
          :key="g.id"
          class="card"
          :href="g.href + '?lang=' + lang"
          :style="{ '--accent': g.accent, '--shadow': g.shadow, '--icon-bg': g.iconBg, '--gradient': g.gradient, '--btn-bg': g.btnBg, '--btn-color': g.btnColor }"
        >
          <div class="card-header">
            <div class="card-icon">{{ g.icon }}</div>
            <div class="card-title">{{ gField(g, 'title') }}</div>
          </div>
          <div v-html="g.preview"></div>
          <p class="card-tagline">{{ gField(g, 'tagline') }}</p>
          <div class="card-rules">
            <div v-for="rule in gRules(g)" class="rule">
              <div class="rule-dot"></div>
              <span v-html="rule"></span>
            </div>
          </div>
          <div class="play-btn" v-html="T('play') + ' ' + gField(g, 'title') + ' <span class=\'play-arrow\'>→</span>'"></div>
        </a>
      </div>
    </div>
  </div>

  <footer>
    {{ T('footerHint') }}
    &nbsp;·&nbsp; <a href="how-to-play.html" style="color:#6e7681;text-decoration:none;transition:color .15s" onmouseover="this.style.color='#c9d1d9'" onmouseout="this.style.color='#6e7681'">{{ T('howToPlay') }}</a>
    &nbsp;·&nbsp; <span id="ver" style="font-family:monospace"></span>
  </footer>
</div>

<script>
const CATEGORIES = [
  { label: 'Shapes & Colors', games: [] },
  { label: 'Geography',       games: [] },
  { label: 'Words',           games: [] },
  { label: 'Codes',           games: [] },
  { label: 'Classic Games',   games: [] },
];
</script>
<script src="card-chromino.js"></script>
<script src="card-tessera.js"></script>
<script src="card-colorku.js"></script>
<script src="card-woodoku.js"></script>
<script src="card-outlines.js"></script>
<script src="card-wordsearch.js"></script>
<script src="card-crossword.js"></script>
<script src="card-wordladder.js"></script>
<script src="card-18words.js"></script>
<script src="card-splice.js"></script>
<script src="card-morse.js"></script>
<script src="card-braille.js"></script>
<script src="card-xo.js"></script>
<script src="card-dotsboxes.js"></script>
<script src="card-fourinrow.js"></script>
<script src="card-squava.js"></script>
<script src="card-morris.js"></script>
<script src="card-reversi.js"></script>
<script src="card-frogstoads.js"></script>
<script src="card-sprouts.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

const STRINGS = {
  siteTitle:  { en: 'Puzzle Games', he: 'משחקי חשיבה', es: 'Juegos de Puzzles' },
  siteSub:    { en: 'A growing collection of puzzles and classic games — word, logic, and strategy.',
                he: 'אוסף גדל והולך של חידות ומשחקים קלאסיים — מילים, לוגיקה ואסטרטגיה.',
                es: 'Una colección creciente de puzzles y juegos clásicos — palabras, lógica y estrategia.' },
  howToPlay:  { en: 'How to Play', he: 'איך משחקים', es: 'Cómo Jugar' },
  footerHint: { en: 'Drag shapes · Tap to select · Swipe to rotate',
                he: 'גררו צורות · הקישו לבחירה · החליקו לסיבוב',
                es: 'Arrastra formas · Toca para seleccionar · Desliza para girar' },
  play:       { en: 'Play', he: 'שחק', es: 'Jugar' },
};

const CATEGORY_LABELS = {
  'Shapes & Colors': { he: 'צורות וצבעים', es: 'Formas y Colores' },
  'Geography':       { he: 'גאוגרפיה', es: 'Geografía' },
  'Words':           { he: 'מילים', es: 'Palabras' },
  'Codes':           { he: 'קודים', es: 'Códigos' },
  'Classic Games':   { he: 'משחקים קלאסיים', es: 'Juegos Clásicos' },
};

const LANG_KEY = 'index-lang';

Vue.createApp({
  data: () => ({ CATEGORIES, lang: localStorage.getItem(LANG_KEY) || 'en' }),
  mounted() { this.applyDir(); },
  methods: {
    T(key) { const v = STRINGS[key]; return v ? (v[this.lang] || v.en) : key; },
    catLabel(label) { return (CATEGORY_LABELS[label] && CATEGORY_LABELS[label][this.lang]) || label; },
    gField(g, field) { return g[field + '_' + this.lang] || g[field]; },
    gRules(g) { return g['rules_' + this.lang] || g.rules; },
    applyDir() { document.documentElement.setAttribute('dir', this.lang === 'he' ? 'rtl' : 'ltr'); },
    setLang(l) {
      this.lang = l;
      localStorage.setItem(LANG_KEY, l);
      this.applyDir();
    },
  },
}).mount('#app');
(function(){
  const d = new Date(document.lastModified);
  const p = n => String(n).padStart(2,'0');
  document.getElementById('ver').textContent =
    d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
})();
</script>
</body>
</html>
