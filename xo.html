<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X O — Tic-Tac-Toe</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="netplay.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
[v-cloak] { display: none; }

:root {
  --cell: clamp(92px, calc((100vw - 48px) / 3), 124px);
  --net-panel-width: calc(var(--cell) * 3);
  --net-btn-bg: #1a0d0f; --net-btn-border: #f43f5e; --net-btn-color: #f472b6;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 48px;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Top bar ─────────────────────────────────────────────────────── */
.top-bar {
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.back-link {
  color: #6e7681;
  text-decoration: none;
  font-size: 0.85rem;
  transition: color 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.back-link:hover { color: #c9d1d9; }
[dir="ltr"] .back-link::before { content: '←'; }
[dir="rtl"] .back-link::after  { content: '→'; }
.lang-toggle { display: flex; gap: 4px; }
.lang-btn {
  background: none;
  border: 1px solid #30363d;
  color: #6e7681;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.78rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.lang-btn.active  { background: #1a0d0f; border-color: #f43f5e; color: #f472b6; }
.lang-btn:hover:not(.active) { color: #c9d1d9; border-color: #6e7681; }

/* ── Title ───────────────────────────────────────────────────────── */
h1 {
  font-size: 3.2rem;
  font-weight: 900;
  letter-spacing: 0.18em;
  margin-bottom: 24px;
  text-align: center;
  line-height: 1;
}
h1 .x { color: #f472b6; }
h1 .o { color: #60a5fa; }

/* ── Score ───────────────────────────────────────────────────────── */
.score-bar {
  display: flex;
  width: calc(var(--cell) * 3);
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 14px;
}
.score-item {
  flex: 1;
  padding: 12px 8px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
  transition: background 0.2s;
}
.score-item + .score-item { border-inline-start: 1px solid #21262d; }
.score-item::after {
  content: '';
  position: absolute;
  bottom: 0; left: 12px; right: 12px;
  height: 3px;
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform 0.25s ease;
}
.score-x.active  { background: rgba(244,63,94,0.06); }
.score-x.active::after { background: #f472b6; transform: scaleX(1); }
.score-o.active  { background: rgba(96,165,250,0.06); }
.score-o.active::after { background: #60a5fa; transform: scaleX(1); }

.score-label {
  font-size: 0.68rem;
  color: #6e7681;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
}
.score-val {
  font-size: 2rem;
  font-weight: 800;
  line-height: 1;
  min-width: 1.2ch;
  text-align: center;
}
.score-x    .score-val { color: #f472b6; }
.score-draw .score-val { color: #6e7681; }
.score-o    .score-val { color: #60a5fa; }

/* ── Status ──────────────────────────────────────────────────────── */
.status {
  height: 2.2rem;
  font-size: 1.1rem;
  font-weight: 700;
  color: #c9d1d9;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  letter-spacing: 0.01em;
}
.status.won-x { color: #f472b6; }
.status.won-o { color: #60a5fa; }
.status.draw  { color: #8b949e; }

.turn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  animation: pulse 1.4s ease infinite;
}
.turn-dot.dot-x { background: #f472b6; }
.turn-dot.dot-o { background: #60a5fa; }
@keyframes pulse {
  0%, 100% { opacity: 1;   transform: scale(1);   }
  50%       { opacity: 0.4; transform: scale(0.65); }
}

/* ── Board ───────────────────────────────────────────────────────── */
.board {
  display: grid;
  grid-template-columns: repeat(3, var(--cell));
  grid-template-rows:    repeat(3, var(--cell));
  margin-bottom: 24px;
}
.cell {
  background: transparent;
  border-right:  3px solid #2d333b;
  border-bottom: 3px solid #2d333b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--cell) * 0.5);
  font-weight: 900;
  cursor: default;
  transition: background 0.1s;
  position: relative;
  overflow: hidden;
}
.cell:nth-child(3n)  { border-right: none; }
.cell:nth-child(n+7) { border-bottom: none; }

.cell.clickable { cursor: pointer; }
.cell.clickable:hover { background: rgba(255,255,255,0.04); }

.mark { display: block; line-height: 1; }
.mark-x { color: #f472b6; }
.mark-o { color: #60a5fa; }

/* hover preview */
.cell.clickable:hover::after {
  content: attr(data-preview);
  position: absolute;
  font-size: calc(var(--cell) * 0.5);
  font-weight: 900;
  opacity: 0.15;
  line-height: 1;
}
.cell.preview-x:hover::after { color: #f472b6; }
.cell.preview-o:hover::after { color: #60a5fa; }

.cell.winning { background: rgba(255,255,255,0.04); }
.cell.winning .mark-x { color: #fb7185; text-shadow: 0 0 28px rgba(244,63,94,0.75); }
.cell.winning .mark-o { color: #93c5fd; text-shadow: 0 0 28px rgba(96,165,250,0.75); }

/* pop-in animation */
@keyframes popIn {
  0%   { transform: scale(0.3); opacity: 0; }
  65%  { transform: scale(1.2); }
  100% { transform: scale(1);   opacity: 1; }
}
.pop-enter-active { animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* ── Mode bar ────────────────────────────────────────────────────── */
.mode-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
  width: calc(var(--cell) * 3);
}
.mode-btn {
  background: #161b22;
  border: 1px solid #30363d;
  color: #8b949e;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.82rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn:hover:not(.active) { border-color: #6e7681; color: #c9d1d9; }
.mode-btn.active { background: #1a0d0f; border-color: #f43f5e; color: #f472b6; }

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn-row {
  display: flex;
  gap: 10px;
}
.new-game-btn {
  background: #1a0d0f;
  border: 1px solid #f43f5e;
  color: #f472b6;
  border-radius: 10px;
  padding: 11px 40px;
  font-size: 0.92rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
  letter-spacing: 0.04em;
}
.new-game-btn:hover  { opacity: 0.85; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(244,63,94,0.2); }
.new-game-btn:active { transform: translateY(0); box-shadow: none; }

.reset-scores-btn {
  background: none;
  border: 1px solid #30363d;
  color: #6e7681;
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 0.9rem;
  font-family: inherit;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.reset-scores-btn:hover { color: #c9d1d9; border-color: #6e7681; }

</style>
</head>
<body>
<div id="app" v-cloak :dir="isRTL ? 'rtl' : 'ltr'">

  <!-- Top bar -->
  <div class="top-bar">
    <a class="back-link" href="index.html">{{ UI.back }}</a>
    <div class="lang-toggle">
      <button class="lang-btn" :class="{active: lang==='en'}" @click="setLang('en')">EN</button>
      <button class="lang-btn" :class="{active: lang==='he'}" @click="setLang('he')">עב</button>
      <button class="lang-btn" :class="{active: lang==='es'}" @click="setLang('es')">ES</button>
      <button class="lang-btn" :class="{active: lang==='ar'}" @click="setLang('ar')">عر</button>
    </div>
  </div>

  <h1><span class="x">✕</span> <span class="o">○</span></h1>

  <!-- Score: dir=ltr keeps X/Draws/O in consistent left-to-right order -->
  <div class="score-bar" dir="ltr">
    <div class="score-item score-x" :class="{active: phase === 'playing' && current === 'X' && !aiThink}">
      <div class="score-label">X</div>
      <div class="score-val">{{ scores.X }}</div>
    </div>
    <div class="score-item score-draw">
      <div class="score-label">{{ UI.draws }}</div>
      <div class="score-val">{{ scores.draw }}</div>
    </div>
    <div class="score-item score-o" :class="{active: phase === 'playing' && current === 'O' && !aiThink}">
      <div class="score-label">O</div>
      <div class="score-val">{{ scores.O }}</div>
    </div>
  </div>

  <net-panel v-if="mode === 'net'"></net-panel>

  <!-- Status -->
  <div class="status" :class="statusClass">
    <template v-if="isRTL">
      <!-- Won: [ניצח][X] → RTL flex puts ניצח right, X left → reads "ניצח X" in Hebrew -->
      <template v-if="phase === 'won'">
        <span>{{ statusText }}</span>
        <span :class="current === 'X' ? 'mark-x' : 'mark-o'">{{ current }}</span>
      </template>
      <!-- Turn: [X][תור][·] → RTL flex puts X right, תור left → visually "· תור X" (תור before X) -->
      <template v-else>
        <span v-if="showPlayerMark" :class="current === 'X' ? 'mark-x' : 'mark-o'">{{ current }}</span>
        <span>{{ statusText }}</span>
        <span v-if="phase === 'playing' && !aiThink" class="turn-dot" :class="current === 'X' ? 'dot-x' : 'dot-o'"></span>
      </template>
    </template>
    <template v-else>
      <span v-if="phase === 'playing' && !aiThink" class="turn-dot" :class="current === 'X' ? 'dot-x' : 'dot-o'"></span>
      <span v-if="showPlayerMark" :class="current === 'X' ? 'mark-x' : 'mark-o'">{{ current }}</span>
      <span>{{ statusText }}</span>
    </template>
    <span v-if="phase === 'won'">🎉</span>
  </div>

  <!-- Board -->
  <div class="board">
    <div
      v-for="(cell, i) in board"
      :key="i"
      class="cell"
      :class="{
        clickable: canClick(i),
        winning:   winLine && winLine.includes(i),
        'preview-x': !cell && phase === 'playing' && current === 'X',
        'preview-o': !cell && phase === 'playing' && current === 'O' && (mode === '2p' || mode === 'net'),
      }"
      :data-preview="!cell && phase === 'playing' ? current : ''"
      @click="clickCell(i)">
      <transition name="pop">
        <span v-if="cell" :key="cell + i" class="mark" :class="cell === 'X' ? 'mark-x' : 'mark-o'">{{ cell }}</span>
      </transition>
    </div>
  </div>

  <!-- Mode selector -->
  <div class="mode-bar">
    <button class="mode-btn" :class="{active: mode==='2p'}"     @click="setMode('2p')">{{ UI.mode2p }}</button>
    <button class="mode-btn" :class="{active: mode==='easy'}"   @click="setMode('easy')">{{ UI.modeEasy }}</button>
    <button class="mode-btn" :class="{active: mode==='medium'}" @click="setMode('medium')">{{ UI.modeMedium }}</button>
    <button class="mode-btn" :class="{active: mode==='hard'}"   @click="setMode('hard')">{{ UI.modeHard }}</button>
    <button class="mode-btn" :class="{active: mode==='net'}"    @click="setMode('net')">{{ UI.modeNet }}</button>
  </div>

  <!-- Actions -->
  <div class="btn-row">
    <button class="new-game-btn" @click="newGame">{{ UI.newGame }}</button>
    <button class="reset-scores-btn" @click="resetScores" :title="UI.resetScores">↺</button>
  </div>

</div>

<script>
const { createApp, ref, computed, provide } = Vue;

const STRINGS = {
  back:        { en: 'All Games',      he: 'כל המשחקים',     es: 'Todos los juegos',      ar: 'كل الألعاب' },
  mode2p:      { en: '👥 2 Players',  he: '👥 2 שחקנים',    es: '👥 2 Jugadores',        ar: '👥 لاعبان' },
  modeEasy:    { en: '🤖 Easy',       he: '🤖 קל',            es: '🤖 Fácil',              ar: '🤖 سهل' },
  modeMedium:  { en: '🤖 Medium',     he: '🤖 בינוני',        es: '🤖 Medio',              ar: '🤖 متوسط' },
  modeHard:    { en: '🤖 Hard',       he: '🤖 קשה',           es: '🤖 Difícil',            ar: '🤖 صعب' },
  modeNet:     { en: '🌐 Network',    he: '🌐 רשת',           es: '🌐 Red',                ar: '🌐 شبكة' },
  wonVerb:     { en: 'wins!',          he: 'ניצח',              es: 'gana!',                 ar: 'فاز' },
  turnWord:    { en: "'s turn",        he: 'תור',              es: 'turno',                 ar: 'دور' },
  draw:        { en: "It's a draw!",  he: 'תיקו!',           es: '¡Empate!',              ar: 'تعادل!' },
  thinking:    { en: 'Thinking…',     he: 'המחשב חושב…',     es: 'Pensando…',             ar: 'يفكر…' },
  newGame:     { en: 'New Game',      he: 'משחק חדש',        es: 'Nueva partida',         ar: 'لعبة جديدة' },
  draws:       { en: 'Draws',         he: 'תיקו',            es: 'Empates',               ar: 'تعادل' },
  resetScores: { en: 'Reset scores',  he: 'אפס ניקוד',       es: 'Reiniciar puntos',      ar: 'إعادة النقاط' },
};

const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function checkWinner(board) {
  for (const line of WIN_LINES) {
    const [a, b, c] = line;
    if (board[a] && board[a] === board[b] && board[a] === board[c])
      return { winner: board[a], line };
  }
  return null;
}

function minimax(board, isMaximizing, depth) {
  const result = checkWinner(board);
  if (result) return result.winner === 'O' ? 10 - depth : depth - 10;
  if (board.every(c => c !== null)) return 0;

  let best = isMaximizing ? -Infinity : Infinity;
  for (let i = 0; i < 9; i++) {
    if (board[i] !== null) continue;
    board[i] = isMaximizing ? 'O' : 'X';
    const score = minimax(board, !isMaximizing, depth + 1);
    board[i] = null;
    best = isMaximizing ? Math.max(best, score) : Math.min(best, score);
  }
  return best;
}

function getBestMove(board) {
  let best = -Infinity, move = -1;
  for (let i = 0; i < 9; i++) {
    if (board[i] !== null) continue;
    board[i] = 'O';
    const score = minimax(board, false, 1);
    board[i] = null;
    if (score > best) { best = score; move = i; }
  }
  return move;
}

function getRandomMove(board) {
  const empty = board.reduce((a, c, i) => (c === null ? [...a, i] : a), []);
  return empty.length ? empty[Math.floor(Math.random() * empty.length)] : -1;
}

// Medium: take a win or block a loss, otherwise random
function getMediumMove(board) {
  const findThreat = (mark) => {
    for (const [a, b, c] of WIN_LINES) {
      const cells = [a, b, c];
      const marks = cells.filter(i => board[i] === mark).length;
      const empty = cells.find(i => board[i] === null);
      if (marks === 2 && empty !== undefined) return empty;
    }
    return -1;
  };
  const win   = findThreat('O'); if (win   >= 0) return win;
  const block = findThreat('X'); if (block >= 0) return block;
  return getRandomMove(board);
}

const PALETTES = {
  X: ['#f43f5e','#f472b6','#fb7185','#fda4af','#fbbf24','#fb923c'],
  O: ['#3b82f6','#60a5fa','#93c5fd','#38bdf8','#06b6d4','#a5f3fc'],
};

function launchFireworks(player) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:200;';
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const cols = PALETTES[player] || PALETTES.X;
  const particles = [];

  function burst(x, y) {
    for (let i = 0; i < 65; i++) {
      const angle = Math.PI * 2 * i / 65;
      const spd   = 2 + Math.random() * 6;
      particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
        alpha: 1, color: cols[Math.floor(Math.random() * cols.length)], r: 2 + Math.random() * 3 });
    }
  }

  const end = Date.now() + 3000;
  let lastBurst = 0;
  function frame(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (now - lastBurst > 420 && Date.now() < end - 500) {
      burst(canvas.width * (0.2 + Math.random() * 0.6), canvas.height * (0.1 + Math.random() * 0.4));
      lastBurst = now;
    }
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= 0.016;
      if (p.alpha <= 0) continue;
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    particles.splice(0, particles.length, ...particles.filter(p => p.alpha > 0));
    if (Date.now() < end || particles.length > 0) requestAnimationFrame(frame);
    else document.body.removeChild(canvas);
  }
  burst(canvas.width * 0.5, canvas.height * 0.35);
  requestAnimationFrame(frame);
}

const SAVE_KEY = 'xo-save';

createApp({
  components: { NetPanel },
  setup() {
    const lang    = ref('en');
    const mode    = ref('2p');
    const board   = ref(Array(9).fill(null));
    const current = ref('X');
    const phase   = ref('playing');
    const winLine = ref(null);
    const aiThink      = ref(false);
    const humanScores  = ref({ X: 0, O: 0, draw: 0 });
    const aiScores     = ref({ X: 0, O: 0, draw: 0 });
    function scoresRef() { return ['easy','medium','hard'].includes(mode.value) ? aiScores : humanScores }
    const scores = computed(() => scoresRef().value);

    const netCtrl = createNetplay({
      gameId: 'xo',
      onMove(data) {
        if (mode.value !== 'net') return;
        if (data.type === 'move' && phase.value === 'playing') makeMove(data.i, true);
        else if (data.type === 'newgame') resetBoard();
      },
      onReset: () => resetBoard(),
      onSync() { if (netCtrl.netStatus === 'connected') mode.value = 'net'; },
    });
    provide('_netplay', netCtrl);

    const isRTL = computed(() => lang.value === 'he' || lang.value === 'ar');

    const UI = computed(() => {
      const l = lang.value;
      return Object.fromEntries(Object.entries(STRINGS).map(([k, v]) => [k, v[l] || v.en]));
    });

    const showPlayerMark = computed(() =>
      phase.value === 'won' || (phase.value === 'playing' && !aiThink.value)
    );

    const statusText = computed(() => {
      if (mode.value === 'net' && netCtrl.netStatus !== 'connected') return '';
      if (aiThink.value)          return UI.value.thinking;
      if (phase.value === 'won')  return UI.value.wonVerb;
      if (phase.value === 'draw') return UI.value.draw;
      return UI.value.turnWord;
    });

    const statusClass = computed(() => {
      if (phase.value === 'won')  return current.value === 'X' ? 'won-x' : 'won-o';
      if (phase.value === 'draw') return 'draw';
      return '';
    });

    function canClick(i) {
      if (board.value[i] !== null) return false;
      if (phase.value !== 'playing') return false;
      if (aiThink.value) return false;
      if (mode.value === 'net') {
        if (netCtrl.netStatus !== 'connected') return false;
        return netCtrl.isMyTurn(current.value === 'X' ? 1 : 2);
      }
      if (mode.value !== '2p' && current.value === 'O') return false;
      return true;
    }

    function resetBoard() {
      board.value   = Array(9).fill(null);
      current.value = 'X';
      phase.value   = 'playing';
      winLine.value  = null;
      aiThink.value  = false;
    }

    function makeMove(i, remote = false) {
      const b = [...board.value];
      b[i] = current.value;
      board.value = b;

      if (!remote && mode.value === 'net') netCtrl.send({ type: 'move', i });

      const result = checkWinner(b);
      if (result) {
        winLine.value = result.line;
        phase.value = 'won';
        const sr = scoresRef(); sr.value = { ...sr.value, [current.value]: sr.value[current.value] + 1 };
        launchFireworks(current.value);
        save();
        return;
      }
      if (b.every(c => c !== null)) {
        phase.value = 'draw';
        const sr = scoresRef(); sr.value = { ...sr.value, draw: sr.value.draw + 1 };
        save();
        return;
      }

      current.value = current.value === 'X' ? 'O' : 'X';

      if (mode.value !== '2p' && mode.value !== 'net' && current.value === 'O') {
        aiThink.value = true;
        setTimeout(() => {
          aiThink.value = false;
          const move = mode.value === 'hard'   ? getBestMove([...board.value])
                     : mode.value === 'medium' ? getMediumMove([...board.value])
                     :                           getRandomMove([...board.value]);
          if (move >= 0) makeMove(move);
        }, 380);
      }
    }

    function clickCell(i) {
      if (!canClick(i)) return;
      makeMove(i);
    }

    function newGame() {
      resetBoard();
      if (mode.value === 'net') netCtrl.send({ type: 'newgame' });
    }

    function setMode(m) {
      mode.value = m;
      resetBoard();
      save();
    }

    function setLang(l) {
      lang.value = l;
      save();
    }

    function resetScores() {
      humanScores.value = { X: 0, O: 0, draw: 0 };
      aiScores.value    = { X: 0, O: 0, draw: 0 };
      resetBoard();
      save();
    }

    function save() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          lang: lang.value,
          mode: mode.value === 'net' ? '2p' : mode.value,
          humanScores: humanScores.value,
          aiScores: aiScores.value,
        }));
      } catch {}
    }

    function load() {
      try {
        const s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
        if (!s) return;
        if (s.lang)        lang.value        = s.lang;
        if (s.mode)        mode.value        = s.mode;
        if (s.humanScores) humanScores.value = s.humanScores;
        if (s.aiScores)    aiScores.value    = s.aiScores;
        if (s.scores && !s.humanScores) humanScores.value = s.scores;
      } catch {}
    }

    load();

    return {
      lang, mode, board, current, phase, winLine, scores, aiThink, netCtrl,
      isRTL, UI, showPlayerMark, statusText, statusClass,
      canClick, clickCell, newGame, setMode, setLang, resetScores,
    };
  }
}).mount('#app');
</script>
<script>
(function(){
  const d=new Date(document.lastModified),p=n=>String(n).padStart(2,"0");
  const v=document.createElement("div");
  v.style.cssText="position:fixed;bottom:4px;right:6px;font-size:0.6rem;color:#444c56;pointer-events:none;font-family:monospace;z-index:999";
  v.textContent=d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
  document.body.appendChild(v);
})();
</script>
