<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splice · Puzzle Games</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
[v-cloak] { display: none; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117; color: #c9d1d9;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 16px 16px 64px;
  user-select: none; -webkit-user-select: none;
}
.top-bar {
  width: 100%; max-width: 400px; display: flex;
  justify-content: space-between; align-items: center; margin-bottom: 20px;
}
.back-link { color: #6e7681; text-decoration: none; font-size: .85rem; transition: color .15s; }
.back-link:hover { color: #c9d1d9; }
[dir="ltr"] .back-link::before { content: '← '; }
[dir="rtl"] .back-link::after  { content: ' →'; }
.lang-toggle { display: flex; gap: 4px; }
.lang-btn {
  background: none; border: 1px solid #30363d; color: #6e7681;
  border-radius: 6px; padding: 4px 8px; font-size: .78rem; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: all .15s;
}
.lang-btn.active { background: #0c1d2e; border-color: #38bdf8; color: #38bdf8; }
.lang-btn:hover:not(.active) { color: #c9d1d9; border-color: #6e7681; }
h1 {
  font-size: 2.4rem; font-weight: 900; letter-spacing: .14em;
  margin-bottom: 4px; text-align: center;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle { font-size: .8rem; color: #6e7681; text-align: center; margin-bottom: 16px; letter-spacing: .06em; }
.status-bar {
  height: 2.2rem; display: flex; align-items: center; justify-content: center;
  font-size: .9rem; font-weight: 700; letter-spacing: .04em; margin-bottom: 8px;
  width: 100%; max-width: 400px;
}
.status-bar.idle    { color: #444c56; }
.status-bar.correct { color: #38bdf8; }
.status-bar.win     { color: #34d399; }
.puzzle-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; direction: ltr; }
.nav-btn {
  background: #161b22; border: 1px solid #30363d; color: #6e7681;
  border-radius: 8px; padding: 5px 12px; font-size: .82rem; font-weight: 700;
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.nav-btn:hover:not(:disabled) { color: #c9d1d9; border-color: #6e7681; }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }
.puzzle-num { font-size: .82rem; color: #8b949e; min-width: 80px; text-align: center; }
.board { width: min(320px, 90vw); height: min(320px, 90vw); display: block; margin: 0 auto 16px; }
.edge-bg   { stroke: #21262d; stroke-width: 2; stroke-linecap: round; }
.edge-path { stroke: #38bdf8; stroke-width: 3.5; stroke-linecap: round; opacity: .8; }
.node { cursor: pointer; }
.node circle { transition: fill .1s, stroke .1s; }
.node text   { pointer-events: none; font-weight: 800; font-family: 'Segoe UI', system-ui, sans-serif; }
.node-default circle { fill: #1e2d3d; stroke: #4a6a8a; stroke-width: 2; }
.node-default text   { fill: #c9d1d9; font-size: 16px; }
.node-adjacent circle { fill: #1e2d3d; stroke: #6b9dc0; stroke-width: 2; }
.node-adjacent text   { fill: #e6edf3; font-size: 16px; }
.node-in-path circle  { fill: #0a1929; stroke: #38bdf8; stroke-width: 2.5; }
.node-in-path text    { fill: #38bdf8; font-size: 16px; }
.node-last circle     { fill: #0c1d2e; stroke: #67e8f9; stroke-width: 3.5; }
.node-last text       { fill: #e0f2fe; font-size: 16px; }
.node-dim circle      { fill: #131a22; stroke: #21262d; stroke-width: 1.5; }
.node-dim text        { fill: #30363d; font-size: 16px; }
.node:hover .node-default circle,
.node:hover .node-adjacent circle { stroke: #38bdf8; }
.node:hover .node-default text,
.node:hover .node-adjacent text   { fill: #7dd3fc; }
.current-word {
  height: 2.8rem; width: 100%; max-width: 400px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.7rem; font-weight: 900; letter-spacing: .1em;
  color: #38bdf8; font-family: monospace; margin-bottom: 10px;
}
.current-word.empty { color: #30363d; font-size: .85rem; font-weight: 400; letter-spacing: .04em; font-family: inherit; }
.progress { font-size: .75rem; color: #6e7681; text-align: center; margin-bottom: 10px; letter-spacing: .06em; }
.found-list {
  width: 100%; max-width: 400px; display: flex; flex-wrap: wrap;
  gap: 6px; justify-content: center; margin-bottom: 20px; min-height: 34px;
}
.found-word {
  padding: 4px 10px; border-radius: 7px; font-size: .82rem; font-weight: 700;
  letter-spacing: .06em; font-family: monospace;
  background: #0d2a1e; border: 1.5px solid #4ade80; color: #4ade80;
}
.action-row { display: flex; gap: 10px; }
.action-btn {
  padding: 9px 20px; border-radius: 9px; font-size: .88rem; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all .15s; letter-spacing: .04em;
  border: 1.5px solid #30363d; background: #161b22; color: #6e7681;
}
.action-btn:hover:not(:disabled) { color: #c9d1d9; border-color: #6e7681; }
.action-btn:disabled { opacity: .3; cursor: not-allowed; }
.action-btn.primary { background: #0c1d2e; color: #38bdf8; border-color: #38bdf8; }
.action-btn.primary:hover { background: #112233; }
.fw-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
[dir="rtl"] .current-word { font-family: 'Segoe UI', system-ui, sans-serif; letter-spacing: 0; }
[dir="rtl"] .found-word   { font-family: 'Segoe UI', system-ui, sans-serif; letter-spacing: 0; }
[dir="rtl"] .subtitle, [dir="rtl"] .progress { letter-spacing: 0; }
</style>
</head>
<body>
<div id="app" v-cloak :dir="isRTL ? 'rtl' : 'ltr'">

  <div class="top-bar">
    <a class="back-link" href="index.html">{{ t('back') }}</a>
    <div class="lang-toggle">
      <button class="lang-btn" :class="{active: lang==='en'}" @click="setLang('en')">EN</button>
      <button class="lang-btn" :class="{active: lang==='he'}" @click="setLang('he')">HE</button>
      <button class="lang-btn" :class="{active: lang==='es'}" @click="setLang('es')">ES</button>
    </div>
  </div>

  <h1>SPLICE</h1>
  <div class="subtitle">{{ t('subtitle') }}</div>
  <div class="status-bar" :class="statusClass">{{ statusMsg }}</div>

  <div class="puzzle-nav">
    <button class="nav-btn" @click="prevPuzzle" :disabled="puzzleIdx === 0">‹</button>
    <div class="puzzle-num">{{ t('puzzle') }} {{ puzzleIdx + 1 }} / {{ puzzles.length }}</div>
    <button class="nav-btn" @click="nextPuzzle" :disabled="puzzleIdx === puzzles.length - 1">›</button>
  </div>

  <svg viewBox="0 0 300 300" class="board">
    <line v-for="e in allEdges" :key="e.key"
      :x1="npos(e.a).x" :y1="npos(e.a).y"
      :x2="npos(e.b).x" :y2="npos(e.b).y"
      class="edge-bg"/>
    <line v-for="(ni, pi) in path" v-if="pi > 0" :key="'p'+pi"
      :x1="npos(path[pi-1]).x" :y1="npos(path[pi-1]).y"
      :x2="npos(ni).x" :y2="npos(ni).y"
      class="edge-path"/>
    <g v-for="(letter, i) in puzzle.letters" :key="i"
      class="node" :class="nodeClass(i)" @click.stop="tap(i)">
      <circle :cx="npos(i).x" :cy="npos(i).y" :r="nodeR"/>
      <text :x="npos(i).x" :y="npos(i).y" dy=".36em" text-anchor="middle"
        :font-size="nodeFontSize">{{ letter }}</text>
    </g>
  </svg>

  <div class="current-word" :class="{ empty: path.length === 0 }" :dir="isRTL ? 'rtl' : 'ltr'">
    {{ path.length === 0 ? t('tapNode') : currentWord }}
  </div>

  <div class="progress" :dir="isRTL ? 'rtl' : 'ltr'">{{ progressLine }}</div>

  <div class="found-list">
    <span v-for="w in found" :key="w" class="found-word" :dir="isRTL ? 'rtl' : 'ltr'">{{ w }}</span>
  </div>

  <div class="action-row">
    <button class="action-btn" @click="clearPath" :disabled="path.length === 0">{{ t('clear') }}</button>
    <button class="action-btn primary" @click="newGame">{{ t('newGame') }}</button>
  </div>

  <canvas class="fw-canvas" ref="fwCanvas" width="1" height="1"></canvas>
</div>

    { letters: ['L','A','D','R','O','N','E','S','T'], cols: 3, min: 15 },
  ],
};

const I18N = {
  en: { back:'Games', subtitle:'Trace connected letters to find words', puzzle:'Puzzle', words:'words', goal:'find {n} to win', goalReached:'Goal reached! Keep going…', tapNode:'tap a letter to start', clear:'Clear', newGame:'New Puzzle', correct:'✓ Word found!', win:'🎉 Goal reached!' },
  he: { back:'משחקים', subtitle:'עקוב אחר אותיות מחוברות כדי למצוא מילים', puzzle:'חידה', words:'מילים', goal:'מצא {n} לניצחון', goalReached:'יעד הושג! המשך…', tapNode:'לחץ על אות להתחלה', clear:'נקה', newGame:'חידה חדשה', correct:'✓ מילה נמצאה!', win:'🎉 יעד הושג!' },
  es: { back:'Juegos', subtitle:'Traza letras conectadas para encontrar palabras', puzzle:'Puzzle', words:'palabras', goal:'encuentra {n} para ganar', goalReached:'¡Meta alcanzada! Sigue…', tapNode:'toca una letra para empezar', clear:'Borrar', newGame:'Nuevo Puzzle', correct:'✓ ¡Palabra encontrada!', win:'🎉 ¡Meta alcanzada!' },
};

createApp({
  setup() {
    const lang = ref(localStorage.getItem('splice-lang') || 'en');
    const isRTL = computed(() => lang.value === 'he');
    const t = k => I18N[lang.value][k] || k;

    const puzzles = computed(() => PUZZLES[lang.value]);
    const puzzleIdx = ref(0);
    const puzzle = computed(() => puzzles.value[puzzleIdx.value]);

    const path = ref([]);
    const found = ref([]);
    const statusMsg = ref('');
    const statusClass = ref('idle');
    const won = ref(false);
    const fwCanvas = ref(null);

    const currentWord = computed(() =>
      path.value.map(i => puzzle.value.letters[i]).join('')
    );

    function npos(i) {
      const cols = puzzle.value.cols;
      const rows = Math.ceil(puzzle.value.letters.length / cols);
      const step = Math.min(180 / Math.max(cols - 1, 1), 180 / Math.max(rows - 1, 1));
      const ox = (300 - (cols - 1) * step) / 2;
      const oy = (300 - (rows - 1) * step) / 2;
      return { x: ox + (i % cols) * step, y: oy + Math.floor(i / cols) * step };
    }

    const nodeR = computed(() => {
      const cols = puzzle.value.cols;
      const rows = Math.ceil(puzzle.value.letters.length / cols);
      const step = Math.min(180 / Math.max(cols - 1, 1), 180 / Math.max(rows - 1, 1));
      return Math.max(16, Math.min(28, Math.round(step * 0.3)));
    });

    const nodeFontSize = computed(() => Math.max(11, Math.round(nodeR.value * (isRTL.value ? 0.66 : 0.57))));

    const allEdges = computed(() => {
      const { cols, letters } = puzzle.value;
      const edges = [];
      for (let a = 0; a < letters.length; a++)
        for (let b = a + 1; b < letters.length; b++) {
          const dc = Math.abs((a % cols) - (b % cols));
          const dr = Math.abs(Math.floor(a / cols) - Math.floor(b / cols));
          if (dc <= 1 && dr <= 1) edges.push({ a, b, key: `${a}-${b}` });
        }
      return edges;
    });

    function adjToLast(i) {
      if (!path.value.length) return false;
      const last = path.value[path.value.length - 1];
      const cols = puzzle.value.cols;
      return Math.abs((i % cols) - (last % cols)) <= 1 &&
             Math.abs(Math.floor(i / cols) - Math.floor(last / cols)) <= 1 &&
             i !== last;
    }

    function nodeClass(i) {
      const inPath = path.value.includes(i);
      const isLast = path.value.length && path.value[path.value.length - 1] === i;
      if (isLast)  return 'node-last';
      if (inPath)  return 'node-in-path';
      if (path.value.length && adjToLast(i))  return 'node-adjacent';
      if (path.value.length) return 'node-dim';
      return 'node-default';
    }

    function tap(i) {
      if (won.value) return;
      if (path.value.length && path.value[path.value.length - 1] === i) {
        path.value.pop(); return;
      }
      if (path.value.includes(i)) return;
      if (!path.value.length || adjToLast(i)) {
        path.value.push(i);
        checkWord();
      } else {
        path.value = [i];
      }
    }

    function checkWord() {
      const word = currentWord.value;
      if (word.length < 4) return;
      const norm = lang.value === 'he' ? normWord(word) : word;
      if (!DICT[lang.value].has(norm)) return;
      const already = found.value.some(f => (lang.value === 'he' ? normWord(f) : f) === norm);
      if (already) return;
      const display = lang.value === 'he' ? (HE_CANONICAL[norm] || word) : word;
      found.value.push(display);
      path.value = [];
      if (!won.value && found.value.length >= puzzle.value.min) {
        won.value = true;
        statusClass.value = 'win'; statusMsg.value = t('win');
        launchFireworks();
      } else if (!won.value) {
        const def = lang.value === 'he' ? HE_DEFS[norm] : null;
        statusClass.value = 'correct';
        statusMsg.value = def ? `✓ ${display} — ${def}` : `✓ ${display}`;
        setTimeout(() => { statusClass.value = 'idle'; statusMsg.value = ''; }, def ? 2800 : 1800);
      }
    }

    function clearPath() { path.value = []; }

    function loadPuzzle() {
      path.value = []; found.value = []; won.value = false;
      statusClass.value = 'idle'; statusMsg.value = '';
    }

    function prevPuzzle() { if (puzzleIdx.value > 0) { puzzleIdx.value--; loadPuzzle(); } }
    function nextPuzzle() { if (puzzleIdx.value < puzzles.value.length - 1) { puzzleIdx.value++; loadPuzzle(); } }
    function newGame() { puzzleIdx.value = (puzzleIdx.value + 1) % puzzles.value.length; loadPuzzle(); }
    const langState = {};
    function setLang(l) {
      langState[lang.value] = { idx: puzzleIdx.value, found: [...found.value], won: won.value };
      lang.value = l;
      localStorage.setItem('splice-lang', l);
      path.value = [];
      const s = langState[l];
      if (s) {
        puzzleIdx.value = s.idx;
        found.value = s.found;
        won.value = s.won;
        statusClass.value = s.won ? 'win' : 'idle';
        statusMsg.value = s.won ? t('win') : '';
      } else {
        puzzleIdx.value = 0; found.value = []; won.value = false;
        statusClass.value = 'idle'; statusMsg.value = '';
      }
    }

    function launchFireworks() {
      const canvas = fwCanvas.value;
      if (!canvas) return;
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');
      const palette = ['#38bdf8','#818cf8','#34d399','#f472b6','#fbbf24'];
      const particles = [];
      for (let b = 0; b < 5; b++) {
        const cx = Math.random() * canvas.width, cy = Math.random() * canvas.height * 0.6;
        for (let i = 0; i < 60; i++) {
          const a = Math.PI * 2 * i / 60, s = 2 + Math.random() * 4;
          particles.push({ x: cx, y: cy, vx: Math.cos(a)*s, vy: Math.sin(a)*s, alpha: 1, color: palette[i % palette.length] });
        }
      }
      (function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=.07; p.alpha-=.016; ctx.globalAlpha=Math.max(0,p.alpha); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); });
        if (particles.some(p => p.alpha > 0)) requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      })();
    }

    onMounted(loadPuzzle);

    const progressLine = computed(() => {
      const n = found.value.length;
      const min = puzzle.value.min;
      const suffix = won.value ? t('goalReached') : t('goal').replace('{n}', min);
      return `${n} ${t('words')} · ${suffix}`;
    });

    return { lang, isRTL, t, puzzles, puzzleIdx, puzzle, path, found, statusMsg, statusClass, won, fwCanvas, currentWord, allEdges, npos, nodeR, nodeFontSize, nodeClass, tap, clearPath, prevPuzzle, nextPuzzle, newGame, setLang, progressLine };
  }
}).mount('#app');
</script>
</body>
</html>
